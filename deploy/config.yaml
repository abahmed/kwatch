apiVersion: v1
kind: Namespace
metadata:
  name: kwatch
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kwatch
  namespace: kwatch
data:
  config.yaml: |
    # ── General ──────────────────────────────────────────────
    maxRecentLogLines: <number>    # also caps logs/events in alert message blocks (default 50)
    ignoreFailedGracefulShutdown: <boolean>
    ignoreDisruptionTerminations: <boolean>    # skip pods evicted during node drains (default true)
    reportStartupBaseline: <boolean>           # send one startup summary of pre-existing issues (default true)
    containerRestartThreshold: <number>        # alert if a container restarts this many times (0 = off, default 0)
    workers: <number>                          # parallel reconcile workers (default 1)

    # Optional periodic resync (0 = event-driven only); raise to e.g. 600 only if a
    # periodic full-reconcile safety net is wanted
    resyncSeconds: <seconds>

    # ── Namespace / Reason / Container filtering ──────────
    namespaces:
      - <optional_namespace>
    reasons:
      - <optional_reason>
    ignoreContainerNames:
      - <optional_container_name>
    ignorePodNames:
      - "<optional_regex_pattern>"
    ignoreLogPatterns:
      - "<optional_log_regex>"
    ignoreContainerMessages:
      - "<optional_substring>"
    namespaceSelector:
      "<label_selector>"     # k8s label selector, mutually exclusive with namespaces
    includeEvents: <boolean>  # include events section in alerts (default true)
    includeLogs: <boolean>    # include logs section in alerts (default true)

    # ── Severity ──────────────────────────────────────────
    # Map owner kinds to severity levels
    severityByOwnerKind:
      <owner_kind>: "<severity>"
    severityByReason:
      <reason>: "<severity>"     # checked before owner-kind

    # ── Silences (suppress matching incidents entirely) ──
    silences:
      - nodeReasons: ["<reason>"]
        nodeMessages: ["<message>"]
      # - namespaces: ["<namespace>"]
      # - reasons: ["<reason>"]
      # - podNamePatterns: ["<regex>"]
      # - containerNames: ["<container>"]
      # - logPatterns: ["<regex>"]
      # - containerMessages: ["<substring>"]

    # ── Correlation (incident dedup & lifecycle) ──────────
    correlation:
      window: <minutes>                # correlation window (default 10 min)
      lifecycleInterval: <minutes>     # stale-incident check interval (default 1 min)
      resolveHoldDown: <seconds>       # flap dampening before resolve (default 300)
      maxBaseline: 5000                # max baseline entries (default 5000)
      escalation:
        enabled: <boolean>             # auto-escalate severity by restart count (default true)
        tiers: [3, 10, 50]             # restart thresholds: 3→"high", 10→"critical"
      # renotify:
      #   intervalBySeverity:
      #     default: <minutes>         # renotify interval per severity (0 = off)
      #   maxPerIncident: <number>

    # ── Monitors ──────────────────────────────────────────
    pendingPodMonitor:
      enabled: <boolean>     # detect pods stuck in Pending
      threshold: <seconds>   # seconds before alerting (default 300)

    nodeMonitor:
      enabled: <boolean>
      # sustainedMinutes: <minutes>    # Debounce for pressure conditions (default 3)

    rolloutMonitor:
      enabled: <boolean>

    daemonSetMonitor:
      enabled: <boolean>
      # sustainedMinutes: <minutes>    # Debounce before alerting (default 5)

    jobMonitor:
      enabled: <boolean>

    cronJobMonitor:
      enabled: <boolean>
      # sustainedMinutes: <minutes>    # Debounce for suspension alert (default 5)

    hpaMonitor:
      enabled: <boolean>
      # sustainedMinutes: <minutes>

    tlsMonitor:
      enabled: <boolean>
      # threshold: <days>              # alert before expiry (default 30)
      # criticalThreshold: <days>      # high severity before expiry (default 3)

    heartbeatMonitor:
      enabled: <boolean>
      # interval: <seconds>            # ping interval (default 300)
      # url: "<url>"                   # external endpoint to ping

    pvcMonitor:
      # NOTE: usage is read from each node's kubelet stats/summary, which only reports
      # volumes that are currently MOUNTED by a running pod. A Bound-but-unmounted PVC
      # (e.g. before its consumer pod schedules) has no usage data and is not checked
      # until a pod mounts it. Volumes mounted only during CronJob/Job runs are handled
      # by the last-known-usage cache (retained across unmounts).
      enabled: <boolean>           # default true
      interval: 5                  # check interval (minutes, default 5)
      threshold: 80                # warn at this % (default 80)
      criticalThreshold: 90        # critical at this % (default 90)
      clearThreshold: 75           # resolve below this % (default 75)

    # ── AI enrichment (self-hosted) ──────────────────────
    llm:
      enabled: <boolean>     # enabled by default; deploy kwatch-llm sidecar for RCA

    # ── Templates / Runbooks ──────────────────────────────
    # templates:
    #   <reason>: "<go_template_string>"
    # runbooks:
    #   <reason>: "<url>"

    # ── Dashboard URL template (optional) ─────────────────
    # dashboardURLTemplate: "https://grafana.example.com/d/abc?var-ns={namespace}&var-pod={pod}"

    # ── Health check ──────────────────────────────────────
    healthCheck:
      enabled: <boolean>           # default true
      port: 8060                   # listen port (default 8060)
      # pprof: <boolean>           # set true to enable /debug/pprof/* profiling endpoints
      # diagnostics: <boolean>     # set true to enable /incidents, /test-alert endpoints
      # diagnosticsToken: "<token>" # optional Bearer token for diagnostic endpoints

    # ── App ───────────────────────────────────────────────
    app:
      clusterName: "<cluster_name>"
      # proxyURL: "<url>"
      # disableStartupMessage: <boolean>
      # logFormatter: "<text|json>"
      # insecureSkipTLSVerify: <boolean>
      # caBundlePath: "<path>"

    # ── Upgrader ──────────────────────────────────────────
    upgrader:
      disableUpdateCheck: <boolean>

    # ── Inhibition / Storm ────────────────────────────────
    # inhibition:
    #   nodeSuppressesPods: <boolean>  # suppress pod alerts on unhealthy nodes (default true)
    # storm:                           # enabled by default; batches rapid alerts into digests
    #   enabled: <boolean>             # (default true)
    #   threshold: 10                  # max creates per window before digest mode
    #   windowMinutes: 5               # sliding window (minutes)
    #   digestIntervalMinutes: 5       # digest summary interval (minutes)

    # ── CRD watcher ───────────────────────────────────────
    # crd:
    #   enabled: <boolean>   # watch KwatchConfig CRs for live config changes

    # ── Alert providers ───────────────────────────────────
    alert:
      slack:
        webhook: <webhook_url>
        # Optional routing + retry:
        # routes:
        #   - namespaces: ["production"]
        #     severities: ["high"]
        # retry:
        #   maxAttempts: 3
        #   delay: 5s

      pagerduty:
        integrationKey: <integration_key>

      discord:
        webhook: <webhook_url>

      telegram:
        token: <token_key>
        chatId: <chat_id>

      email:
        from: <from_mail>
        to: <to_mail>
        password: <password>
        host: <host>
        port: <port_number>

      teams:
        webhook: <webhook_url>

      rocketchat:
        webhook: <webhook_url>

      mattermost:
        webhook: <webhook_url>

      opsgenie:
        apiKey: <api_key>

      # matrix:
      #   homeserverUrl: "<url>"
      #   userId: "<user>"
      #   accessToken: "<token>"
      #   roomId: "<room>"

      # dingtalk:
      #   webhook: <webhook_url>

      # feishu:
      #   webhook: <webhook_url>

      # webhook:
      #   url: "<url>"
      #   headers:
      #     Authorization: "<token>"

      # zenduty:
      #   integrationKey: <integration_key>

      # googlechat:
      #   webhook: <webhook_url>

