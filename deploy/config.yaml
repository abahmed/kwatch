apiVersion: v1
kind: Namespace
metadata:
  name: kwatch
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kwatch
  namespace: kwatch
data:
  config.yaml: |
    # ── General ──────────────────────────────────────────────
    maxRecentLogLines: <number>    # also caps logs/events in alert message blocks (default 100)
    ignoreFailedGracefulShutdown: <boolean>

    # Optional periodic resync (0 = event-driven only); raise to e.g. 600 only if a
    # periodic full-reconcile safety net is wanted
    resyncSeconds: <seconds>

    # ── Namespace / Reason / Container filtering ──────────
    namespaces:
      - <optional_namespace>
    reasons:
      - <optional_reason>
    ignoreContainerNames:
      - <optional_container_name>
    ignorePodNames:
      - "<optional_regex_pattern>"
    ignoreLogPatterns:
      - "<optional_log_regex>"

    # ── Severity ──────────────────────────────────────────
    # Map owner kinds to severity levels
    severityByOwnerKind:
      <owner_kind>: "<severity>"

    # ── Silences (suppress matching incidents entirely) ──
    silences:
      - nodeReasons: ["<reason>"]
        nodeMessages: ["<message>"]
      # - namespaces: ["<namespace>"]
      # - reasons: ["<reason>"]
      # - podNamePatterns: ["<regex>"]

    # ── Correlation (incident dedup & lifecycle) ──────────
    correlation:
      window: <minutes>
      lifecycleInterval: <minutes>
      # resolveHoldDown: <seconds>    # Seconds to wait before resolving (flap dampening)

    # ── Monitors ──────────────────────────────────────────
    nodeMonitor:
      enabled: <boolean>

    rolloutMonitor:
      enabled: <boolean>

    daemonSetMonitor:
      enabled: <boolean>
      # sustainedMinutes: <minutes>    # Debounce before alerting (default 5)

    jobMonitor:
      enabled: <boolean>

    cronJobMonitor:
      enabled: <boolean>

    pvcMonitor:
      # NOTE: usage is read from each node's kubelet stats/summary, which only reports
      # volumes that are currently MOUNTED by a running pod. A Bound-but-unmounted PVC
      # (e.g. before its consumer pod schedules) has no usage data and is not checked
      # until a pod mounts it. Volumes mounted only during CronJob/Job runs are handled
      # by the last-known-usage cache (retained across unmounts).
      enabled: <boolean>
      interval: <minutes>
      threshold: <percentage>
      criticalThreshold: <percentage>

    # ── AI enrichment (self-hosted) ──────────────────────
    llm:
      enabled: <boolean>     # the only knob — model/endpoint/redaction are fixed in code

    # ── Dashboard URL template (optional) ─────────────────
    # dashboardURLTemplate: "https://grafana.example.com/d/abc?var-ns={namespace}&var-pod={pod}"

    # ── Health check ──────────────────────────────────────
    healthCheck:
      enabled: <boolean>
      port: <port>
      # pprof: <boolean>      # set true to enable /debug/pprof/* profiling endpoints

    # ── App ───────────────────────────────────────────────
    app:
      clusterName: "<cluster_name>"
      # proxyURL: "<url>"
      # disableStartupMessage: <boolean>
      # logFormatter: "<text|json>"

    # ── Upgrader ──────────────────────────────────────────
    upgrader:
      disableUpdateCheck: <boolean>

    # ── Alert providers ───────────────────────────────────
    alert:
      slack:
        webhook: <webhook_url>
        # Optional routing + retry:
        # routes:
        #   - namespaces: ["production"]
        #     severities: ["high"]
        # retry:
        #   maxAttempts: 3
        #   delay: 5s

      pagerduty:
        integrationKey: <integration_key>

      discord:
        webhook: <webhook_url>

      telegram:
        token: <token_key>
        chatId: <chat_id>

      email:
        from: <from_mail>
        to: <to_mail>
        password: <password>
        host: <host>
        port: <port_number>

      teams:
        webhook: <webhook_url>

      rocketchat:
        webhook: <webhook_url>

      mattermost:
        webhook: <webhook_url>

      opsgenie:
        apiKey: <api_key>

