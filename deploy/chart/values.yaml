# Default values for kwatch.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  repository: ghcr.io/abahmed/kwatch
  pullPolicy: IfNotPresent

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  readOnlyRootFilesystem: true

service:
  port: 8060

resources:
  limits:
    memory: 256Mi
    cpu: 100m
  requests:
    memory: 128Mi
    cpu: 100m

nodeSelector: {}

tolerations: []

affinity: {}

podAnnotations: {}

sacAnnotations: {}

podLabels: {}

# kwatch configuration
# All detection monitors are ON by default; see docs.
# resyncSeconds defaults to 0 (event-driven). workers defaults to 1 — raise on large
# clusters (≈1 per few-thousand pods); each worker fans out to ≤7 goroutines.
# To enable TLS monitoring (reads Secrets):
# tlsMonitor:
#   enabled: true
#   threshold: 30
config: {}

# -- LLM sidecar configuration (AI enrichment, enabled by default)
llm:
  # -- model image (published manually via .github/workflows/publish-llm.yml)
  repository: ghcr.io/abahmed/kwatch-llm
  # -- model image version; bump AFTER publishing a new tag (Fix 6a). Independent of appVersion.
  tag: "latest"

# -- Configure the upgrader/update checker
upgrader:
  # -- Disable the update check at startup
  disableUpdateCheck: false



