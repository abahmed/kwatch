# Default values for kwatch.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/abahmed/kwatch
  pullPolicy: Always

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  readOnlyRootFilesystem: true

service:
  port: 8060

resources:
  limits:
    memory: 256Mi
    cpu: 100m

nodeSelector: {}

tolerations: []

affinity: {}

podAnnotations: {}

sacAnnotations: {}

podLabels: {}

# kwatch configuration
# All detection monitors are ON by default; see docs.
# To enable TLS monitoring (reads Secrets):
# tlsMonitor:
#   enabled: true
#   threshold: 30
config: {}

# -- LLM sidecar configuration (opt-in AI enrichment)
llm:
  # -- model image (published manually via .github/workflows/publish-llm.yml)
  repository: ghcr.io/abahmed/kwatch-llm
  # -- model image version; bump AFTER publishing a new tag (Fix 6a). Independent of appVersion.
  tag: "v1"
  # -- Use K8s ≥1.29 native sidecar (initContainer restartPolicy:Always) vs plain container
  nativeSidecar: false

# -- Configure the upgrader/update checker
upgrader:
  # -- Disable the update check at startup
  disableUpdateCheck: false



