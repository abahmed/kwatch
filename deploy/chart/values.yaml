# Default values for kwatch.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/abahmed/kwatch
  pullPolicy: Always

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  readOnlyRootFilesystem: true

service:
  port: 8060

resources:
  limits:
    memory: 256Mi
    cpu: 100m

nodeSelector: {}

tolerations: []

affinity: {}

podAnnotations: {}

sacAnnotations: {}

podLabels: {}

# kwatch configuration
# All detection monitors are ON by default; see docs.
# To enable TLS monitoring (reads Secrets):
# tlsMonitor:
#   enabled: true
#   threshold: 30
config: {}

# -- Configure the upgrader/update checker
upgrader:
  # -- Disable the update check at startup
  disableUpdateCheck: false



