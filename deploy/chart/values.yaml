# Default values for kwatch.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  repository: ghcr.io/abahmed/kwatch
  pullPolicy: Always

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  readOnlyRootFilesystem: true

resources:
  limits:
    memory: 128Mi
    cpu: 100m

nodeSelector: {}

tolerations: []

affinity: {}

podAnnotations: {}

sacAnnotations: {}

podLabels: {}

# kwatch configuration
config:
  # telemetry:
  #   enabled: true  # Enable anonymous telemetry to help track kwatch usage



