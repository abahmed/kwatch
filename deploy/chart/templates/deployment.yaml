apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kwatch.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kwatch.labels" . | nindent 4 }}
spec:
  {{- if gt (int .Values.replicaCount) 1 }}
  {{- fail "kwatch must run a single replica: it is the sole writer of the kwatch-baseline/kwatch-pvc ConfigMaps" }}
  {{- end }}
  replicas: {{ .Values.replicaCount | default 1 }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "kwatch.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "kwatch.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      restartPolicy: Always
      serviceAccountName:  {{ .Release.Name }}
      {{- $llmEnabled := .Values.config.llm.enabled | default true }}
      {{- if and $llmEnabled (gt (int (.Values.replicaCount | default 1)) 1) }}
        {{- fail "LLM sidecar is a singleton; set replicaCount=1 when config.llm.enabled=true" }}
      {{- end }}
  {{- if and $llmEnabled .Values.llm.nativeSidecar }}
      initContainers:
        - name: llm
          restartPolicy: Always
          {{- include "kwatch.llmContainer" . | nindent 10 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.service.port }}
          ports:
            - name: health
              containerPort: {{ . }}
          {{- end }}
          volumeMounts:
          - name: config-volume
            mountPath: /config
          env:
            - name: CONFIG_FILE
              value: "/config/config.yaml"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: GOMEMLIMIT
              valueFrom:
                resourceFieldRef:
                  resource: limits.memory
                  divisor: "1"
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if and $llmEnabled (not .Values.llm.nativeSidecar) }}
        - name: llm
          {{- include "kwatch.llmContainer" . | nindent 10 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $llmEnabled }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else }}
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - { key: kubernetes.io/arch, operator: In, values: [amd64, arm64] }
      {{- end }}
      {{- else }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ .Release.Name }}
