apiVersion: v2
name: kwatch
version: "0.11.0"
appVersion: "v0.11.0"
description: monitor all changes in your Kubernetes(K8s) cluster, detects crashes
  in your running apps in realtime, and publishes notifications to your channels (Slack,
  Discord, etc.) instantly
type: application
home: https://kwatch.dev
icon: https://kwatch.dev/img/kwatch-logo.png
sources:
  - https://github.com/abahmed/kwatch
keywords:
  - kwatch
  - kubernetes
  - monitoring
  - crash-reporting
  - event-notifier
  - ai
  - llm
maintainers:
  - email: a.ahmed1026@gmail.com
    name: Abdelrahman Ahmed
    url: github.com/abahmed
  - email: yaserkalali.work@gmail.com
    name: yaser
    url: github.com/yaskinny
annotations:
  artifacthub.io/links: |
    - name: Documentation
      url: https://kwatch.dev
    - name: Source
      url: https://github.com/abahmed/kwatch
  artifacthub.io/license: MIT
  artifacthub.io/changes: |
    - kind: added
      description: "AI incident enrichment (opt-in, default-off): self-hosted LLM sidecar (MiniCPM5-1B via llama.cpp) appends likely cause to alerts — no data leaves the cluster, deterministic hints remain the backbone."
    - kind: added
      description: "Cheap-depth enhancements (LLM-free): signature-based hints, correlation surfaces affected-pod count and node root-cause, runbook links, investigate commands, and dashboard deep-links."
    - kind: added
      description: "GOMEMLIMIT env on kwatch container for improved OOM protection."

