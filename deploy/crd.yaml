                  properties:
                    enabled:
                      type: boolean
                rolloutMonitor:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                daemonSetMonitor:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                jobMonitor:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                cronJobMonitor:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                heartbeatMonitor:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    interval:
                      type: integer
                    url:
                      type: string
                healthCheck:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    port:
                      type: integer
                app:
                  type: object
                  properties:
                    clusterName:
                      type: string
                    proxyURL:
                      type: string
                    disableStartupMessage:
                      type: boolean
                    logFormatter:
                      type: string
