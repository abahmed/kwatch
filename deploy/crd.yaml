                  format: int64
                workers:
                  type: integer
                ignoreFailedGracefulShutdown:
                  type: boolean
                namespaces:
                  type: array
                  items:
                    type: string
                reasons:
                  type: array
                  items:
                    type: string
                ignoreContainerNames:
                  type: array
                  items:
                    type: string
                ignorePodNames:
                  type: array
                  items:
                    type: string
                ignoreLogPatterns:
                  type: array
                  items:
                    type: string
                severityByOwnerKind:
                  type: object
                  additionalProperties:
                    type: string
                pendingPodThreshold:
                  type: integer
                resyncSeconds:
                  type: integer
                silences:
                  type: array
