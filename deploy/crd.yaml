apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kwatchconfigs.kwatch.abahmed.dev
spec:
  group: kwatch.abahmed.dev
  scope: Namespaced
  names:
    plural: kwatchconfigs
    singular: kwatchconfig
    kind: KwatchConfig
    shortNames:
