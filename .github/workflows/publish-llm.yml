name: Publish LLM image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "image tag override (default: release version)"
        required: false

jobs:
  push_llm_image:
    name: Push kwatch-llm image to GHCR
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: docker buildx prune -af && df -h
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/abahmed/kwatch-llm
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
      - uses: docker/build-push-action@v6
        with:
          context: deploy/llm
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MODEL_VERSION=${{ steps.meta.outputs.version }}
