name: Publish LLM image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "model image version, e.g. v2"
        required: true

jobs:
  push_llm_image:
    name: Push kwatch-llm image to GHCR
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7
      - name: Free disk space
        run: docker buildx prune -af && df -h
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/abahmed/test2-llm
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          context: deploy/llm
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: MODEL_VERSION=${{ github.event.inputs.version }}
